services:
  - type: web
    name: dna-matcher
    runtime: python
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
    plan: free